<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Vault - Nalar Swatantra</title>
    <style>
        body { background: #000B1A; color: #F5F5F5; font-family: sans-serif; text-align: center; padding: 20px; }
        .vault-card { background: rgba(0,0,0,0.5); border: 1px solid #D4AF37; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #001529; border: 1px solid #D4AF37; color: white; border-radius: 5px; }
        button { background: #D4AF37; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px; }
        #dashboard { display: none; } /* Tersembunyi sebelum login */
    </style>
</head>
<body>

    <h1 style="color:#D4AF37;">ADMIN VAULT</h1>

    <div id="loginSection" class="vault-card">
        <h3>Akses Terbatas</h3>
        <input type="email" id="email" placeholder="Email Admin">
        <input type="password" id="password" placeholder="Kata Sandi">
        <button id="btnLogin">MASUK KE VAULT</button>
    </div>

    <div id="dashboard" class="vault-card">
        <h2>Selamat Datang, Bos!</h2>
        <p>Markas sudah siap dioperasikan.</p>
        <button onclick="logout()" style="background:red; color:white;">KELUAR</button>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzuYywt3E-nMaQAhzjxvs6l8ZOGyhMx2k",
            authDomain: "nalarswatantra.firebaseapp.com",
            projectId: "nalarswatantra",
            databaseURL: "https://nalarswatantra-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:1043078166951:web:ff2b5dc5d597d296f5de82"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Tombol Login
        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Akses Diterima! Membuka Vault...");
                })
                .catch((error) => {
                    alert("Akses Ditolak: " + error.message);
                });
        });

        // Cek Status Login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        // Fungsi Keluar
        window.logout = () => {
            signOut(auth).then(() => alert("Berhasil Keluar"));
        };
    </script>
</body>
</html>
