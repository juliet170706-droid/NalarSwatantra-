<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Nalar Swatantra</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="login-card">
                <h1 class="login-title">ADMIN PANEL</h1>
                <p class="login-subtitle">Digital Intelligence Vault</p>
                <form id="loginForm">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="login-btn">MASUK</button>
                </form>
                <div id="loginError" class="error-message hidden"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard hidden">
            <header class="admin-header">
                <h1 class="admin-title">NALAR SWATANTRA</h1>
                <div class="admin-actions">
                    <button id="logoutBtn" class="logout-btn">KELUAR</button>
                </div>
            </header>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="news">News</button>
                <button class="tab-btn" data-tab="dictionary">Kamus</button>
            </div>

            <!-- News Management -->
            <div id="newsTab" class="tab-content active">
                <div class="form-section">
                    <h3>Tambah Analisis Baru</h3>
                    <form id="newsForm">
                        <input type="text" id="newsTitle" placeholder="Judul Analisis" required>
                        <select id="newsCategory" required>
                            <option value="">Kategori</option>
                            <option value="Geopolitik">Geopolitik</option>
                            <option value="Media">Media</option>
                            <option value="Teknologi">Teknologi</option>
                            <option value="Ekonomi">Ekonomi</option>
                            <option value="Psikologi">Psikologi</option>
                        </select>
                        <div id="analysisEditor"></div>
                        <div class="links-group">
                            <input type="url" id="westLink" placeholder="West Source (CNN/BBC)">
                            <input type="url" id="eastLink" placeholder="East Source (Al Jazeera/RT)">
                            <input type="url" id="neutralLink" placeholder="Neutral Data (UN/Satellite)">
                        </div>
                        <button type="submit" class="submit-btn">PUBLISH ANALISIS</button>
                    </form>
                </div>
                <div class="list-section">
                    <h3>Daftar Analisis</h3>
                    <div id="newsList"></div>
                </div>
            </div>

            <!-- Dictionary Management -->
            <div id="dictionaryTab" class="tab-content">
                <div class="form-section">
                    <h3>Tambah Kosakata Nalar</h3>
                    <form id="dictForm">
                        <input type="text" id="dictTerm" placeholder="Istilah" required>
                        <textarea id="dictDefinition" placeholder="Definisi" required></textarea>
                        <button type="submit" class="submit-btn">TAMBAH KOSAKATA</button>
                    </form>
                </div>
                <div class="list-section">
                    <h3>Daftar Kosakata</h3>
                    <div id="dictList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase + Quill -->
    <script type="module" src="admin.js"></script>
</body>
</html>
