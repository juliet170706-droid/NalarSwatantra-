<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Nalar Swatantra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>

    <div id="loginGate" class="container" style="padding-top:100px; max-width:400px;">
        <div class="vault-form">
            <h2 style="text-align:center; color:var(--gold);">ACCESS REQUIRED</h2>
            <input type="email" id="admEmail" placeholder="Email">
            <input type="password" id="admPass" placeholder="Password">
            <button onclick="login()" class="btn" style="width:100%; margin-top:10px;">Authorize</button>
        </div>
    </div>

    <div id="adminPanel" class="container" style="display:none; padding-bottom:50px;">
        <h2 class="navbar-brand">Dashboard Admin</h2>
        <div style="text-align:right; margin-bottom:20px;">
            <button onclick="logout()" class="btn" style="border-color:red; color:red;">Logout</button>
        </div>

        <div class="vault-form">
            <h3>+ Tambah Analisis Baru</h3>
            <input type="hidden" id="editId">
            <input type="text" id="judul" placeholder="Judul Berita">
            <div id="editor" style="margin-bottom:10px;"></div>
            <input type="text" id="linkBarat" placeholder="Link Sumber Barat">
            <input type="text" id="linkTimur" placeholder="Link Sumber Timur">
            <input type="text" id="linkNetral" placeholder="Link Fakta Netral">
            <button onclick="saveNews()" class="btn" id="saveBtn">Publish Analisis</button>
        </div>

        <div class="vault-form">
            <h3>+ Tambah Kamus</h3>
            <input type="text" id="term" placeholder="Istilah">
            <textarea id="def" placeholder="Definisi"></textarea>
            <button onclick="saveDict()" class="btn">Update Kamus</button>
        </div>

        <div id="manageList"></div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
