<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Vault - Nalar Swatantra</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <!-- Vault Background -->
    <div class="vault-bg">
        <div class="vault-grid"></div>
        <div class="vault-glow"></div>
    </div>

    <!-- Login Screen (VISIBLE BY DEFAULT) -->
    <div id="loginScreen" class="auth-container">
        <div class="auth-card">
            <div class="vault-header">
                <div class="vault-logo">
                    <span class="vault-icon">🔐</span>
                    <h1 class="vault-title">ADMIN VAULT</h1>
                    <div class="vault-subtitle">Nalar Swatantra Intelligence</div>
                </div>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Access Code</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" placeholder="admin@nalarswatantra.com" required>
                        <span class="input-icon">📧</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Security Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <span class="input-icon">🔑</span>
                    </div>
                </div>
                <button type="submit" class="vault-btn primary">
                    <span class="btn-text">AUTHENTICATE ACCESS</span>
                    <span class="btn-glow"></span>
                </button>
            </form>
            
            <div id="authStatus" class="status-message"></div>
        </div>
    </div>

    <!-- Dashboard (HIDDEN BY DEFAULT - CSS: display: none) -->
    <div id="dashboardSection" class="dashboard-container" style="display: none;">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-left">
                    <div class="vault-logo small">
                        <span class="vault-icon">🔐</span>
                        <h2 class="vault-title small">ADMIN VAULT</h2>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userEmail" class="user-name"></span>
                        <button id="logoutBtn" class="vault-btn secondary">
                            LOGOUT
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <!-- News Form -->
            <section class="vault-section">
                <h3 class="section-title">CREATE NEWS</h3>
                <form id="newsForm">
                    <input type="text" id="newsTitle" placeholder="News Title" required>
                    <select id="newsCategory" required>
                        <option value="">Category</option>
                        <option value="Geopolitik">Geopolitik</option>
                        <option value="Ekonomi">Ekonomi</option>
                        <option value="Teknologi">Teknologi</option>
                    </select>
                    <div id="quillEditor"></div>
                    <input type="url" id="westLink" placeholder="West Source URL">
                    <input type="url" id="eastLink" placeholder="East Source URL">
                    <input type="url" id="neutralLink" placeholder="Neutral Source URL">
                    <button type="submit">SAVE NEWS</button>
                </form>
            </section>

            <!-- Dictionary Form -->
            <section class="vault-section">
                <h3 class="section-title">ADD DICTIONARY</h3>
                <form id="dictForm">
                    <input type="text" id="dictTerm" placeholder="Term (Istilah)" required>
                    <textarea id="dictDefinition" placeholder="Definition (Definisi)" required></textarea>
                    <button type="submit">SAVE TERM</button>
                </form>
            </section>

            <!-- Lists -->
            <section class="vault-section">
                <h3>News List (<span id="newsCount">0</span>)</h3>
                <div id="newsList"></div>
            </section>
            <section class="vault-section">
                <h3>Dictionary List (<span id="dictCount">0</span>)</h3>
                <div id="dictList"></div>
            </section>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
