<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Vault - Nalar Swatantra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script defer src="admin.js"></script>
</head>
<body class="admin-body">
    <div class="vault-overlay"></div>
    
    <!-- Login Screen -->
    <div id="loginScreen" class="auth-screen">
        <div class="auth-container">
            <div class="logo">
                <h1 class="title">Admin Vault</h1>
                <div class="glow-effect"></div>
            </div>
            <form id="loginForm" class="auth-form">
                <input type="email" id="email" placeholder="Email Admin" required>
                <input type="password" id="password" placeholder="Kata Sandi" required>
                <button type="submit" class="auth-btn">Masuk ke Vault</button>
            </form>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-dashboard hidden">
        <header class="admin-header">
            <div class="container">
                <div class="logo">
                    <h1 class="title">Admin Vault</h1>
                </div>
                <div class="admin-controls">
                    <span id="userEmail"></span>
                    <button id="logoutBtn" class="logout-btn">Keluar</button>
                </div>
            </div>
        </header>

        <main class="admin-main">
            <!-- News Management -->
            <section class="admin-section">
                <div class="container">
                    <h2 class="admin-title">Kelola Berita</h2>
                    <form id="newsForm" class="admin-form">
                        <input type="text" id="newsTitle" placeholder="Judul Berita" required>
                        <div id="quillEditor"></div>
                        <input type="url" id="westLink" placeholder="Link Sumber Barat">
                        <input type="url" id="eastLink" placeholder="Link Sumber Timur">
                        <input type="url" id="neutralLink" placeholder="Link Sumber Netral">
                        <button type="submit">Simpan Berita</button>
                    </form>
                </div>
            </section>

            <!-- Dictionary Management -->
            <section class="admin-section">
                <div class="container">
                    <h2 class="admin-title">Kelola Kosakata</h2>
                    <form id="dictForm" class="admin-form">
                        <input type="text" id="dictTerm" placeholder="Istilah" required>
                        <textarea id="dictDefinition" placeholder="Definisi" required></textarea>
                        <button type="submit">Simpan Kosakata</button>
                    </form>
                </div>
            </section>

            <!-- News List -->
            <section class="admin-section">
                <div class="container">
                    <h2 class="admin-title">Daftar Berita <span id="newsListCount">(0)</span></h2>
                    <div id="newsList" class="admin-list"></div>
                </div>
            </section>

            <!-- Dictionary List -->
            <section class="admin-section">
                <div class="container">
                    <h2 class="admin-title">Daftar Kosakata <span id="dictListCount">(0)</span></h2>
                    <div id="dictList" class="admin-list"></div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
